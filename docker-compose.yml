services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./volume_data/postgres_data:/var/lib/postgresql/data

  minio:
    image: ${MINIO_IMAGE}
    container_name: my_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./volume_data/minio_data:/data

  minio_saas:
    image: ${MINIO_IMAGE}
    container_name: minio_saas
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - ./volume_data/saas_artifacts:/data
    environment:
      MINIO_ROOT_USER: miniosaas
      MINIO_ROOT_PASSWORD: miniosaaspassword
    ports:
      - "8000:9000"
      - "8001:9001"
  # 2. The OpenTelemetry Collector (Router)
  load-generator:
    image: ${IMAGE_NAME}:${DEMO_VERSION}-load-generator
    container_name: load-generator
    build:
      context: ./
      dockerfile: ${LOAD_GENERATOR_DOCKERFILE}
      cache_from:
        - ${IMAGE_NAME}:${DEMO_VERSION}-load-generator
    environment:
      - LOCUST_WEB_PORT
      - LOCUST_USERS
      - LOCUST_HOST
      - LOCUST_WEB_HOST
  otel-collector:
    container_name: otel-collector
    image: ${COLLECTOR_CONTRIB_IMAGE}
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver (if you want to send data from outside docker)
      - "4318:4318" # OTLP HTTP receiver
      - "8889:8889" # Prometheus metrics exporter port
    depends_on:
      - jaeger
      - prometheus
  jaeger:
    container_name: jaeger
    image: ${JAEGERTRACING_IMAGE}
    restart: unless-stopped

    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    # volumes:
    #   - "./jaeger.yml:/etc/jaeger/config.yml"
    ports:
      - "16686:16686"
      - "4317"
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    ports:
      - "3001:3000" # Grafana UI
    volumes:
      - ./grafana/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
      - jaeger

volumes:
  postgres_data:
  minio_data:
